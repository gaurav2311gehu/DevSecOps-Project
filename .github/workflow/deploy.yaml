name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main    

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    # SonarQube Scan  
    - name: SonarQube Scan
      uses: sonarsource/sonarcloud-github-action@master
      with:
        args: >
          -Dsonar.projectKey=sonar.project_key
          -Dsonar.organization=sonar.organization
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        
    - name: OWASP Dependency Check
       uses: dependency-check/Dependency-Check_Action@main
       with:
         project: "devsecops-app"
         scanPath: "."
         format: ALL
         outputDirectory: ./dependency-check-report
    
    # Docker Build and Push
    - name: Build and Push Docker Image
      run: docker build -t devsecops-app .

    - name: Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: devsecops-app:latest
        format: 'table'
        exit-code: '1'
        sererity: 'HIGH,CRITICAL'
